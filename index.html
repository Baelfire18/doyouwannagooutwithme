<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Do you wanna go out with me?</title>
    <link rel="stylesheet" href="./styles.css">
  </head> 
  <body>
    <div class="container">
      <div >
        <h1 class = "header-text">Do you wanna go out with me?</h1>
      </div>
      <div class="gif-container">
        <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExcDdtZ2JiZDR0a3lvMWF4OG8yc3p6Ymdvd3g2d245amdveDhyYmx6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute animated illustration">
      </div>
      <div class = "buttons">
        <button class="btn" id = "yes-button" onclick="nextPage()">Yes</button>
        <button class="btn" id="no-button" onmouseover="moveButton()" onclick="moveButton()">No</button>
        <script>
          function nextPage() {
            window.location.href = "yes.html";
          }
          
          function moveButton() {
            const x = Math.random() * (window.innerWidth - 3 * document.getElementById('no-button').offsetWidth);
            const y = Math.random() * (window.innerHeight - 3 * document.getElementById('no-button').offsetHeight);

            document.getElementById('no-button').style.left = `${x}px`;
            document.getElementById('no-button').style.top = `${y}px`;
          }
        </script> 
      </div>
    </div>
     
  </body> 
</html>
